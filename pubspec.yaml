name: owndo
description: Offline-first todo app with Dropbox sync
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Local database
  drift: ^2.18.0
  drift_flutter: ^0.2.1
  sqlite3_flutter_libs: ^0.5.24

  # Networking
  http: ^1.2.1

  # OAuth2 / browser launch
  # flutter_web_auth_2 removed: it pulls in desktop_webview_window on Linux
  # which requires webkit2gtk. We use url_launcher + app_links (deep links) on
  # mobile/macOS and dart:io HttpServer on Linux instead.
  url_launcher: ^6.3.0
  app_links: ^7.0.0

  # Secure token storage
  flutter_secure_storage: ^10.0.0

  # Routing
  go_router: ^17.2.0

  # Notifications
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4

  # Utilities
  uuid: ^4.4.0
  json_annotation: ^4.9.0
  freezed_annotation: ^3.1.0
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  drift_dev: ^2.18.0
  build_runner: ^2.4.11
  riverpod_generator: ^4.0.3
  freezed: ^3.2.5
  json_serializable: ^6.8.0

  # Testing
  mocktail: ^1.0.4
  sqlite3: any

flutter:
  uses-material-design: true
