name: owndo
description: Offline-first todo app with Dropbox sync
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local database
  drift: ^2.18.0
  drift_flutter: ^0.2.1
  sqlite3_flutter_libs: ^0.5.24

  # Networking
  http: ^1.2.1

  # OAuth2 / browser launch
  # flutter_web_auth_2 removed: it pulls in desktop_webview_window on Linux
  # which requires webkit2gtk. We use url_launcher + app_links (deep links) on
  # mobile/macOS and dart:io HttpServer on Linux instead.
  url_launcher: ^6.3.0
  app_links: ^6.0.0

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Routing
  go_router: ^14.2.0

  # Utilities
  uuid: ^4.4.0
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.1
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  drift_dev: ^2.18.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  freezed: ^2.5.2
  json_serializable: ^6.8.0

  # Testing
  mocktail: ^1.0.4
  sqlite3: any

flutter:
  uses-material-design: true
